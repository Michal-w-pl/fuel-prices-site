<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Strona nie istnieje</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #0f172a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 640px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .code {
        font-size: 14px;
        font-weight: 700;
        color: #2563eb;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.1;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        padding: 12px 16px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid var(--border);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .btn-secondary {
        background: white;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="code">404</div>
      <h1>Nie znaleziono strony</h1>
      <p>
        Taki adres nie istnieje albo strona została przeniesiona.
        Wróć do strony głównej z kalkulatorem paliwa i kosztów przejazdu.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="./">Przejdź do strony głównej</a>
        <a class="btn btn-secondary" href="javascript:history.back()">Wróć</a>
      </div>
    </div>
  </body>
</html>
